<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Prakash Dcosta (dcostaprakash)</title>
    <link href="style.css" rel="stylesheet" />
  </head>

  <body>
  <h1>TV Shows</h1>
<button id="back-button" style="display:none;">Back to Shows</button>
  
<!-- Search -->
<input id="search-input" type="text" placeholder="Search shows..." />

<!-- Show dropdown -->
  <select id="show-selector">
    <option value="">Select a show...</option>
  </select>

  <!-- Episode dropdown -->
  <select id="episode-selector" style="display:none;">
    <option value="all">All Episodes</option>
  </select>

  <!-- Counter -->
  <p id="count"></p>

  <!-- Episodes -->
  <div id="root"></div>

  <p>
    Data originally from
    <a href="https://tvmaze.com/" target="_blank">TVMaze.com</a>
  </p>

  <script src="script.js"></script>
</body>
